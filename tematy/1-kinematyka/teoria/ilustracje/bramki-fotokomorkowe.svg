<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="Verdana, Arial, sans-serif">
  <rect x="0" y="0" width="660" height="250" fill="white"/>

  <text x="330" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Tor pomiarowy (równia pochyła) z bramkami fotokomórkowymi F1 i F2</text>

  <!-- track -->
  <line x1="50" y1="120" x2="610" y2="120" stroke="#333" stroke-width="3"/>

  <!-- START marker -->
  <line x1="70" y1="95" x2="70" y2="120" stroke="#333" stroke-width="2"/>
  <text x="70" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a1a">START</text>

  <!-- Gate F1 -->
  <rect x="253" y="70" width="10" height="14" fill="#2c3e50"/>
  <rect x="253" y="120" width="10" height="14" fill="#2c3e50"/>
  <line x1="258" y1="84" x2="258" y2="120" stroke="#2c8fce" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="258" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">F1</text>

  <!-- Gate F2 -->
  <rect x="433" y="70" width="10" height="14" fill="#2c3e50"/>
  <rect x="433" y="120" width="10" height="14" fill="#2c3e50"/>
  <line x1="438" y1="84" x2="438" y2="120" stroke="#2c8fce" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="438" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">F2</text>

  <!-- cart / wózek moving right -->
  <g>
    <rect x="150" y="100" width="34" height="16" rx="3" fill="#c0392b"/>
    <circle cx="158" cy="118" r="5" fill="#1a1a1a"/>
    <circle cx="176" cy="118" r="5" fill="#1a1a1a"/>
    <line x1="190" y1="108" x2="215" y2="108" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowred)"/>
  </g>

  <!-- distance arrows -->
  <line x1="70" y1="145" x2="258" y2="145" stroke="#333" stroke-width="1.2" marker-start="url(#dstart)" marker-end="url(#dend)"/>
  <text x="164" y="160" text-anchor="middle" font-size="12" fill="#1a1a1a">d = 1,0 m</text>

  <line x1="258" y1="145" x2="438" y2="145" stroke="#333" stroke-width="1.2" marker-start="url(#dstart)" marker-end="url(#dend)"/>
  <text x="348" y="160" text-anchor="middle" font-size="12" fill="#1a1a1a">d = 1,0 m</text>

  <!-- time labels -->
  <text x="258" y="185" text-anchor="middle" font-size="12" fill="#1a1a1a">t₁ = 1,0 s</text>
  <text x="438" y="185" text-anchor="middle" font-size="12" fill="#1a1a1a">t₂ = 1,4 s</text>

  <!-- delta t bracket -->
  <path d="M 258 197 L 258 203 L 438 203 L 438 197" fill="none" stroke="#555" stroke-width="1"/>
  <text x="348" y="218" text-anchor="middle" font-size="12" fill="#555">Δt = t₂ − t₁ = 0,4 s</text>

  <defs>
    <marker id="dstart" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M6,0 L6,6 L0,3 z" fill="#333"/>
    </marker>
    <marker id="dend" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#333"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>
</svg>
