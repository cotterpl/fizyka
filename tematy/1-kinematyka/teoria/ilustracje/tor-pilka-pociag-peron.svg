<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Verdana, Arial, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="660" height="300" fill="white"/>

  <!-- ============ PANEL A: wnętrze pociągu ============ -->
  <text x="150" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Układ: wnętrze pociągu</text>

  <!-- wagon outline -->
  <rect x="40" y="35" width="220" height="200" fill="none" stroke="#333" stroke-width="2"/>
  <!-- window -->
  <rect x="60" y="55" width="180" height="50" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- vertical dashed trajectory -->
  <line x1="150" y1="120" x2="150" y2="215" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,5"/>
  <!-- ball start (open circle) -->
  <circle cx="150" cy="120" r="7" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <!-- ball end (filled circle) -->
  <circle cx="150" cy="215" r="7" fill="#c0392b"/>
  <!-- floor -->
  <line x1="45" y1="225" x2="255" y2="225" stroke="#333" stroke-width="2"/>

  <text x="150" y="255" text-anchor="middle" font-size="13" fill="#1a1a1a">TOR: linia prosta (pionowa)</text>
  <text x="150" y="273" text-anchor="middle" font-size="12" fill="#555">piłeczka spada „prosto w dół”</text>

  <!-- ============ PANEL B: peron ============ -->
  <text x="500" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Układ: peron</text>

  <!-- direction of train arrow -->
  <line x1="390" y1="45" x2="610" y2="45" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="38" text-anchor="middle" font-size="12" fill="#333">kierunek ruchu pociągu</text>

  <!-- wagon outline (same train, shown once) -->
  <rect x="390" y="55" width="220" height="170" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="410" y="70" width="180" height="45" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- curved trajectory: starts near-horizontal, ends steep (parabola) -->
  <path d="M 420 95 Q 545 100 585 210" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,5"/>
  <circle cx="420" cy="95" r="7" fill="white" stroke="#c0392b" stroke-width="2.5"/>
  <circle cx="585" cy="210" r="7" fill="#c0392b"/>

  <!-- platform -->
  <line x1="380" y1="245" x2="620" y2="245" stroke="#333" stroke-width="2"/>
  <g stroke="#333" stroke-width="1.5">
    <line x1="385" y1="245" x2="375" y2="257"/>
    <line x1="405" y1="245" x2="395" y2="257"/>
    <line x1="425" y1="245" x2="415" y2="257"/>
    <line x1="445" y1="245" x2="435" y2="257"/>
    <line x1="465" y1="245" x2="455" y2="257"/>
    <line x1="485" y1="245" x2="475" y2="257"/>
    <line x1="505" y1="245" x2="495" y2="257"/>
    <line x1="525" y1="245" x2="515" y2="257"/>
    <line x1="545" y1="245" x2="535" y2="257"/>
    <line x1="565" y1="245" x2="555" y2="257"/>
    <line x1="585" y1="245" x2="575" y2="257"/>
    <line x1="605" y1="245" x2="595" y2="257"/>
  </g>
  <text x="500" y="270" text-anchor="middle" font-size="12" fill="#555">peron</text>

  <text x="500" y="290" text-anchor="middle" font-size="13" fill="#1a1a1a">TOR: łuk (krzywa)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
